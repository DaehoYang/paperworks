services:
  paperworks:
    image: paperworks:dev
    build:
      context: .
      dockerfile: paperworks.dockerfile
    container_name: paperworks
    user: "${PAPERWORKS_UID:-2000}:${PAPERWORKS_GID:-2000}"
    environment:
      HOME: /home/sheepvs5
      JUPYTERHUB_API_TOKEN: "${PAPERWORKS_API_TOKEN:-}"
      JUPYTERHUB_API_URL: "${JUPYTERHUB_API_URL:-http://host.docker.internal:59999/hub/api}"
      JUPYTERHUB_BASE_URL: "${JUPYTERHUB_BASE_URL:-/}"
      JUPYTERHUB_CLIENT_ID: service-paperworks
      JUPYTERHUB_SERVICE_NAME: paperworks
      JUPYTERHUB_SERVICE_PREFIX: /services/paperworks/
      PAPERWORKS_ALLOWED_USERS: "${PAPERWORKS_ALLOWED_USERS:-sheepvs5}"
      PAPERWORKS_BUILD_FRONTEND: "${PAPERWORKS_BUILD_FRONTEND:-auto}"
      PAPERWORKS_REQUIRE_JUPYTERHUB_AUTH: "${PAPERWORKS_REQUIRE_JUPYTERHUB_AUTH:-1}"
      PYTHONDONTWRITEBYTECODE: "1"
    ports:
      - "127.0.0.1:${PAPERWORKS_PORT:-45001}:45001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/workspace
      - /home/sheepvs5/.codex:/home/sheepvs5/.codex
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:45001/services/paperworks/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
